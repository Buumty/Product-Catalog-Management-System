databaseChangeLog:
  - changeSet:
      id: 1-create-producer-table
      author: wojciech
      changes:
        - createTable:
            tableName: producer
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
  - changeSet:
      id: 2-create-product-table
      author: wojciech
      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
  - changeSet:
      id: 3-add-product-producer-fk
      author: wojciech
      changes:
        - addForeignKeyConstraint:
            baseTableName: product
            baseColumnNames: producer_id
            referencedTableName: producer
            referencedColumnNames: id
            constraintName: fk_product_producer
  - changeSet:
      id: 4-create-product-attributes
      author: wojtek
      changes:
        - createTable:
            tableName: product_attributes
            columns:
              - column:
                  name: product_id
                  type: BIGINT
              - column:
                  name: attribute_key
                  type: VARCHAR(255)
              - column:
                  name: attribute_value
                  type: VARCHAR(255)