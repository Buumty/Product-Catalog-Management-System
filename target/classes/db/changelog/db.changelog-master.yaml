  - changeSet:
      id: 6-reset-product-identity
      author: wojciech
      changes:
        - sql:
            sql: ALTER TABLE product ALTER COLUMN id RESTART WITH 100;

  - changeSet:
      id: 7-reset-producer-identity
      author: wojciech
